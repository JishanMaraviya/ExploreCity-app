name: touristplace
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.2
  http: ^1.3.0
  image_picker: ^1.1.2
  firebase_auth: ^5.4.1
  google_fonts: ^6.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21 # Required for adaptive icon support
  remove_alpha_ios: true
  # Adaptive Icon Configuration
  # ic_launcher_foreground.png has the logo at 60% scale with white padding
  # so Android's adaptive icon mask never crops any part of the logo
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/ic_launcher_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/ic_launcher_foreground.png
